name: Multi-User Tests

on:
  push:
    branches: [main, "phase/**"]
  pull_request:
    branches: [main]

jobs:
  # ─────────────── Phase-specific multi-user tests (fast) ───────────────
  multi-user:
    name: Multi-User Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --no-audit --no-fund --loglevel=error
      - name: Run multi-user test suite
        run: |
          node --import tsx --import ./open-sse/utils/setupPolyfill.ts --import ./tests/_setup/isolateDataDir.ts --test --test-force-exit \
            tests/unit/migration-116-smoke.test.ts \
            tests/unit/multi-user-auth.test.ts \
            tests/unit/multi-user-wallet.test.ts \
            tests/unit/multi-user-marketplace.test.ts \
            tests/unit/multi-user-stripe.test.ts \
            tests/unit/multi-user-preflight-gating.test.ts
        env:
          DATA_DIR: /tmp/omniroute-test
          DISABLE_SQLITE_AUTO_BACKUP: "true"
          OMNIROUTE_MULTI_USER: "true"
          JWT_SECRET: ci-test-jwt-secret-32chars-min
          API_KEY_SECRET: ci-test-api-key-secret

  # ─────────────── Backward-compat: db tests ───────────────
  db-tests:
    name: DB Tests (backward compat)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --no-audit --no-fund --loglevel=error
      - name: Run db tests
        run: |
          node --max-old-space-size=4096 --import tsx --import ./open-sse/utils/setupPolyfill.ts --import ./tests/_setup/isolateDataDir.ts --test --test-concurrency=4 --test-force-exit \
            "tests/unit/db*.test.ts"
        env:
          DATA_DIR: /tmp/omniroute-test
          DISABLE_SQLITE_AUTO_BACKUP: "true"

  # ─────────────── Backward-compat: auth + authz ───────────────
  auth-tests:
    name: Auth + Authz Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --no-audit --no-fund --loglevel=error
      - name: Run auth + authz tests
        run: |
          node --max-old-space-size=4096 --import tsx --import ./open-sse/utils/setupPolyfill.ts --import ./tests/_setup/isolateDataDir.ts --test --test-concurrency=4 --test-force-exit \
            "tests/unit/authz/*.test.ts" "tests/unit/auth/*.test.ts" \
            tests/unit/api-key-lifecycle.test.ts tests/unit/api-key-scope-validation.test.ts \
            tests/unit/api-keys.test.ts tests/unit/management-password.test.ts \
            tests/unit/access-tokens-db.test.ts tests/unit/access-token-scopes.test.ts
        env:
          DATA_DIR: /tmp/omniroute-test
          DISABLE_SQLITE_AUTO_BACKUP: "true"

  # ─────────────── Typecheck + Lint ───────────────
  typecheck-lint:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --no-audit --no-fund --loglevel=error
      - name: Typecheck
        run: npm run typecheck:core

  # ─────────────── Usage + Security + Correctness ───────────────
  usage-security:
    name: Usage + Security + Correctness Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install --no-audit --no-fund --loglevel=error
      - name: Run usage + security + correctness tests
        run: |
          node --max-old-space-size=4096 --import tsx --import ./open-sse/utils/setupPolyfill.ts --import ./tests/_setup/isolateDataDir.ts --test --test-concurrency=4 --test-force-exit \
            "tests/unit/usage*.test.ts" "tests/unit/security/*.test.ts" \
            "tests/unit/cors*.test.ts" "tests/unit/correctness/*.test.ts"
        env:
          DATA_DIR: /tmp/omniroute-test
          DISABLE_SQLITE_AUTO_BACKUP: "true"

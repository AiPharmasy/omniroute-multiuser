name: Multi-User Tests

on:
  push:
    branches: [main, "phase/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Multi-User Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATA_DIR: /tmp/omniroute-test
      DISABLE_SQLITE_AUTO_BACKUP: "true"
      OMNIROUTE_MULTI_USER: "true"
      JWT_SECRET: ci-test-jwt-secret-32chars-min
      API_KEY_SECRET: ci-test-api-key-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci --no-audit --no-fund
      - name: Multi-user unit tests
        run: |
          node --import tsx/esm --import ./open-sse/utils/setupPolyfill.ts --import ./tests/_setup/isolateDataDir.ts --test --test-force-exit \
            tests/unit/migration-116-smoke.test.ts \
            tests/unit/multi-user-auth.test.ts \
            tests/unit/multi-user-wallet.test.ts \
            tests/unit/multi-user-marketplace.test.ts \
            tests/unit/multi-user-stripe.test.ts \
            tests/unit/multi-user-preflight-gating.test.ts
      - name: Typecheck
        run: npm run typecheck:core
      - name: Lint multi-user files
        run: |
          npx eslint \
            src/lib/billing/ src/lib/marketplace/ src/lib/db/users.ts src/lib/db/apiKeys.ts \
            src/lib/db/providers.ts src/lib/db/migrationRunner.ts src/lib/auth/userAuth.ts \
            src/lib/usage/usageEvents.ts src/lib/usage/usageHistory.ts \
            src/sse/handlers/chat.ts src/instrumentation-node.ts \
            src/shared/constants/publicApiRoutes.ts \
            src/app/api/auth/ src/app/api/wallet/ src/app/api/webhooks/ src/app/api/me/ \
            src/app/api/marketplace/ src/app/register/ \
            "src/app/(dashboard)/dashboard/wallet/" \
            "src/app/(dashboard)/dashboard/account/" \
            "src/app/(dashboard)/dashboard/marketplace/" \
            tests/unit/migration-116-smoke.test.ts tests/unit/multi-user-*.test.ts
